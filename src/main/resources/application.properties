#application
app.path-upload-images-products=uploads/products/

spring.application.name=${APP_NAME:seguridad}
server.port=${APP_PORT:8081}

#database
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_spring_api}
#spring.datasource.driverClassName=org.postgresql.Driver
#spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=${DB_PASSWORD:postgres}
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

#JPA
spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

#Swagger open api
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

#Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=

#Actuator
management.endpoints.web.exposure.include=*
management.endpoints.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true